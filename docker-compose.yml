services:
  db:
    image: postgres:16-alpine
    container_name: sakubunzemi-db
    environment:
      POSTGRES_USER: sakubun
      POSTGRES_PASSWORD: sakubun
      POSTGRES_DB: sakubunzemi
    ports:
      - "5433:5432"
    volumes:
      - sakubunzemi_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakubun -d sakubunzemi"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sakubunzemi-api
    # 秘密情報は image に焼かず、ここで実行時に注入（ANTHROPIC_API_KEY / SUPABASE_* を読む）
    env_file:
      - ./apps/api/.env
    environment:
      # コンテナ内からは db サービスに 5432 で繋ぐ（.env の localhost:5433 を上書き）
      DATABASE_URL: postgresql://sakubun:sakubun@db:5432/sakubunzemi
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* はビルド時にクライアントJSへ焼き込まれる（ブラウザから見える値）。
        # ブラウザ→APIは公開ポート localhost:3001 を使う。
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_API_MOCKING: disabled
    container_name: sakubunzemi-web
    environment:
      # Server Component の取得先＝Webコンテナの中なので、サービス名 api:3001
      API_URL: http://api:3001
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sakubunzemi_db_data:
