name: CI

# push(main) と 全PR で lint と typecheck を回す（AWS 認証は不要）。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Prisma クライアントを生成（typecheck が @prisma/client の型を必要とするため）。
      # postinstall でも走るが、CI では明示しておく。
      - name: Generate Prisma client
        run: pnpm --filter @sakubun-zemi/api exec prisma generate

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (turbo)
        run: pnpm typecheck
